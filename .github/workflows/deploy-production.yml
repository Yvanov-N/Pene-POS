name: Deploy Production

# Runs only when a vX.Y.Z release tag is pushed -- merging to main by itself
# does NOT deploy anything anymore. Cutting a release is a deliberate,
# separate step:
#   git tag v1.2.3 && git push origin v1.2.3
# The pushed tag is also the app's version for this run (see resolve-version
# below) -- there is nothing left for CI to compute or bump.
on:
  push:
    tags:
      - "v*.*.*"

# Two tags pushed close together must wait, not run concurrently against the
# same production Supabase project and Vercel deployment -- but a second one
# must NOT cancel a deploy already in flight (half-applied migrations are
# exactly the kind of state you can't safely abandon partway through).
concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read # CI no longer creates/pushes the release tag -- that's now a human action

jobs:
  # ============================================================================
  # Job 1 -- Resolve the release version from the tag that triggered this run.
  # ============================================================================
  # The pushed tag IS the version -- there's nothing to bump or compute here,
  # just parse it back out of GITHUB_REF_NAME (e.g. "v1.2.3" -> "1.2.3") and
  # sanity-check its shape. No checkout needed: the ref name alone is enough.
  #
  # This is deliberately independent of apps/web/public/changelog.json's own
  # auto-bumped version field (.githooks/post-commit bumps that on every
  # local commit) -- that file still tracks the running list of unreleased
  # changes shown in the app's update banner, but which commit actually
  # becomes a numbered *release* is now decided by whoever pushes the tag,
  # not by however many commits happened to land since the last one.
  # apps/web/scripts/gen-version.mjs prefers an exact tag at the built commit
  # over changelog.json's version field for exactly this reason.
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      new_tag: ${{ steps.version.outputs.new_tag }}
    steps:
      - name: Read version from the pushed tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' isn't a vX.Y.Z release tag -- refusing to deploy."
            exit 1
          fi
          echo "new_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "new_tag=$TAG" >> "$GITHUB_OUTPUT"

  # ============================================================================
  # Job 2 -- Supabase: database migrations, then edge functions.
  # ============================================================================
  # Deliberately one job, migrations before functions, no continue-on-error
  # anywhere in it: a function that starts calling a column/table a failed
  # migration never created is worse than not deploying at all, and
  # deploy-vercel's `needs: supabase-deploy` means a failure ANYWHERE in this
  # job -- migrations or functions -- hard-stops the frontend deploy before
  # it can ship a build against a schema that was never actually applied.
  supabase-deploy:
    needs: resolve-version
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      # version pinned, not "latest": floating on latest is what silently
      # broke `supabase db push --project-ref` on us once already (the CLI
      # shipped a breaking flag removal and this pipeline picked it up with
      # no warning). Bump this deliberately when there's a reason to.
      # github-token: without it, resolving even a *pinned* version still
      # calls the GitHub Releases API unauthenticated and shares the public
      # 60-req/hour limit across every GitHub-hosted runner's IP range --
      # trivially exhausted. GITHUB_TOKEN is provided automatically by
      # Actions, no new secret needed.
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # `supabase db push` no longer accepts --project-ref directly (dropped
      # in a recent CLI release) -- it now requires the project to be linked
      # first, then pushed via --linked. functions deploy below is unaffected
      # and still takes --project-ref on its own.
      - name: Link Supabase project
        run: |
          supabase link \
            --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}" \
            --password "${{ secrets.SUPABASE_DB_PASSWORD }}"

      - name: Push database migrations
        run: |
          supabase db push \
            --linked \
            --password "${{ secrets.SUPABASE_DB_PASSWORD }}" \
            --yes

      - name: Deploy edge functions
        # No --no-verify-jwt here: supabase/config.toml already declares the
        # correct verify_jwt per function (false for share-receipt and
        # receipt-og-image, which anonymous receipt links/scrapers must
        # reach; true for dispatch-push and notify-shop-status, which must
        # not be callable by an anonymous request). Forcing it off for every
        # function here would silently deploy dispatch-push/notify-shop-status
        # weaker than they're configured for locally. Deploying the whole
        # functions/ directory (instead of 4 hardcoded names) also means a
        # function added later ships automatically, with no edit to this file.
        run: |
          supabase functions deploy \
            --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"

  # ============================================================================
  # Job 3 -- Vercel: build and promote to production.
  # ============================================================================
  # Uses the official Vercel CLI's "prebuilt deployment" flow (Vercel's own
  # current recommended GitHub Actions pattern) rather than a third-party
  # action: `vercel build` runs the project's actual configured install/build
  # commands (this repo's pnpm-lock.yaml is auto-detected). Confirmed live
  # this DOES still need pnpm installed on the runner first, despite `vercel
  # build` auto-detecting the lockfile -- that auto-detection only decides
  # which package manager to invoke, it doesn't install one: unlike a build
  # actually running on Vercel's own infrastructure (where every supported
  # package manager ships preinstalled in their build image), a bare GitHub
  # Actions runner only has whatever actions/setup-node provides (npm), so
  # without this step `vercel build` fails with `spawn pnpm ENOENT`. Version
  # is read from package.json's own packageManager field (pnpm/action-setup's
  # default when no `version` input is given) -- one source of truth, not a
  # second hardcoded version number to drift out of sync with it.
  #
  # The Vercel project's Root Directory MUST be set to apps/web in the Vercel
  # dashboard (see DEVOPS_SETUP.md) -- these commands are run from the repo
  # root and rely on that setting to find the right app in this monorepo.
  deploy-vercel:
    needs: supabase-deploy
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build (production)
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          # These three take priority over whatever's configured in the
          # Vercel dashboard (if anything is) -- GitHub Secrets stay the one
          # place the team has to look to know what a production build was
          # actually built against.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}

      - name: Deploy prebuilt output
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ============================================================================
  # Job 4 -- Summary + optional staff push notification.
  # ============================================================================
  # if: always() so this still posts an accurate summary when something
  # upstream failed, instead of the whole run just showing 3 red jobs and no
  # explanation -- success() below decides the emoji/wording per section, not
  # whether this job runs at all.
  summarize:
    needs: [resolve-version, supabase-deploy, deploy-vercel]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write deployment summary
        run: |
          {
            echo "# Deployment summary"
            echo
            echo "## 🚀 Release"
            if [ "${{ needs.resolve-version.result }}" = "success" ]; then
              echo "**${{ needs.resolve-version.outputs.new_tag }}** deploying."
            else
              echo "❌ Version resolution failed or was skipped -- nothing else in this run should be trusted."
            fi
            echo
            echo "## 🗄️ Supabase"
            if [ "${{ needs.supabase-deploy.result }}" = "success" ]; then
              echo "✅ Migrations applied. Edge functions deployed: \`dispatch-push\`, \`share-receipt\`, \`receipt-og-image\`, \`notify-shop-status\`."
            else
              echo "❌ Supabase deployment failed -- **the Vercel deploy below was skipped on purpose** to avoid shipping a frontend against an unapplied schema."
            fi
            echo
            echo "## 🌐 Vercel"
            if [ "${{ needs.deploy-vercel.result }}" = "success" ]; then
              echo "✅ Production PWA live: ${{ needs.deploy-vercel.outputs.url }}"
            elif [ "${{ needs.deploy-vercel.result }}" = "skipped" ]; then
              echo "⏭️ Skipped (Supabase deployment above didn't succeed)."
            else
              echo "❌ Vercel deployment failed."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # Optional: nudge staff that a new release is live. Needs
      # SUPABASE_SERVICE_ROLE_KEY -- not in the core secrets list, since
      # dispatch-push (supabase/functions/dispatch-push/index.ts) only
      # honors a role-wide broadcast from the actual service_role key, never
      # from a regular user token. Never fails the run either way -- a
      # missed announcement push is not a reason to red-flag a deployment
      # that otherwise succeeded.
      - name: Notify admins via push (optional)
        if: needs.deploy-vercel.result == 'success' && vars.ENABLE_DEPLOY_PUSH_NOTIFICATION == 'true'
        continue-on-error: true
        run: |
          curl -sS -X POST "https://${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co/functions/v1/dispatch-push" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"targetRole\":\"admin\",\"payload\":{\"title\":\"Nouvelle version\",\"body\":\"🚀 Cite Shop ${{ needs.resolve-version.outputs.new_tag }} est en ligne !\",\"tag\":\"release\"}}"
