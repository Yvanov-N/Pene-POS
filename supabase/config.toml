project_id = "pene-pos-dev"

[api]
enabled = true
port = 55321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 55322
major_version = 15

[studio]
enabled = true
port = 55323

[inbucket]
enabled = true
port = 55324

[analytics]
enabled = false

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = false

# GoTrue's built-in "magic link" template only shows a clickable URL, no
# human-typeable code -- signInWithOtp()/verifyOtp() (used to gate PIN and
# password changes, ProfileSettingsCard.tsx) need an actual 6-digit code the
# admin can read from their inbox and type back in, so this overrides that
# one template with one that surfaces {{ .Token }}.
[auth.email.template.magic_link]
subject = "Your Pene POS verification code"
content_path = "./supabase/templates/otp.html"

[storage]
enabled = true

[realtime]
enabled = true

# Both hit directly by anonymous browsers (clicking a shared receipt link)
# and by social-platform scrapers -- neither ever carries a Supabase auth
# header, so the default verify_jwt gate must be off or every request 401s
# before reaching the function's own bot/human branching.
[functions.share-receipt]
verify_jwt = false

[functions.receipt-og-image]
verify_jwt = false
